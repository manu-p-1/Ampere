  assemblies:
  - Ampere
  namespace: Ampere.Str.Cron
  summary: >-
    A fluent, type-safe builder for constructing <xref href="Ampere.Str.Cron.CronExpression" data-throw-if-not-resolved="false"></xref> instances.


    <p>

    Provides both raw field methods (<xref href="Ampere.Str.Cron.CronBuilder.WithMinutes(System.String)" data-throw-if-not-resolved="false"></xref>) and

    high-level convenience methods (<xref href="Ampere.Str.Cron.CronBuilder.EveryNMinutes(System.Int32)" data-throw-if-not-resolved="false"></xref>,

    <xref href="Ampere.Str.Cron.CronBuilder.AtTime(System.Int32%2cSystem.Int32)" data-throw-if-not-resolved="false"></xref>, <xref href="Ampere.Str.Cron.CronBuilder.OnDaysOfWeek(System.DayOfWeek%5b%5d)" data-throw-if-not-resolved="false"></xref>).

    </p>

    <example>

    <pre><code class="lang-csharp">var expr = new CronBuilder()
        .AtTime(9, 0)
        .OnDaysOfWeek(DayOfWeek.Monday, DayOfWeek.Wednesday, DayOfWeek.Friday)
        .Build();
    // produces "0 9 * * 1,3,5"</code></pre>

    </example>
