  summary: >-
    The range class represents a range of int values. Unlike other <xref href="Ampere.Base.IRangify%601" data-throw-if-not-resolved="false"></xref> implementing classes,

    IntRange contains an <xref href="System.Collections.Generic.IEnumerator%601" data-throw-if-not-resolved="false"></xref> of type int to enumerate through all the values between

    the minimum and maximum ranges. By convention, both sides of the range should be inclusive values.
