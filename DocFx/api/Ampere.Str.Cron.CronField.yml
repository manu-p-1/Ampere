  namespace: Ampere.Str.Cron
  summary: >-
    Represents a single parsed field (e.g. minutes, hours) of a cron expression.

    A field contains one or more <xref href="Ampere.Str.Cron.CronNode" data-throw-if-not-resolved="false"></xref> elements (the comma-separated parts).

    Instances are immutable and thread-safe.
