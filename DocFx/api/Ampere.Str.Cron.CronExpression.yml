    path: ../Ampere/Str/Cron/CronExpression.cs
    startLine: 21
  assemblies:
  - Ampere
  namespace: Ampere.Str.Cron
  summary: >-
    An immutable, thread-safe representation of a fully parsed cron expression.


    <p>

    Supports standard 5-field (minute–DOW), 6-field with seconds, and 7-field

    with seconds + year formats.  Also supports Quartz-style extensions: <code>L</code>,

    <code>W</code>, <code>LW</code>, <code>#</code>, and <code>?</code>.

    </p>

    <p>

    Use <xref href="Ampere.Str.Cron.CronParser.Parse(System.String)" data-throw-if-not-resolved="false"></xref> to obtain instances, or <xref href="Ampere.Str.Cron.CronBuilder" data-throw-if-not-resolved="false"></xref>

    to construct them fluently.

    </p>
