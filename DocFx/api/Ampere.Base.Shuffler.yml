  assemblies:
  - Ampere
  namespace: Ampere.Base
  summary: >-
    Selects <code class="paramref">k</code> random elements from the source using a

    partial Fisher–Yates shuffle. Only the first k positions are shuffled,

    making this O(k) instead of O(n).
  example: []
  syntax:
    content: public static T[] PartialShuffle<T>(ReadOnlySpan<T> source, int k)
    parameters:
    - id: source
      type: System.ReadOnlySpan{{T}}
      description: The source array
    - id: k
      type: System.Int32
      description: The number of elements to select
    typeParameters:
    - id: T
      description: The element type
    return:
      type: '{T}[]'
      description: An array of k randomly selected elements
    content.vb: Public Shared Function PartialShuffle(Of T)(source As ReadOnlySpan(Of T), k As Integer) As T()
