    startLine: 200
  assemblies:
  - Ampere
  namespace: Ampere.Base
  summary: >-
    Produces a random derangement of the given array using Sattolo's algorithm.

    A derangement is a permutation where no element appears in its original position.

    Returns a new array; the original is not modified.
  example: []
  syntax:
    content: public static T[] Derange<T>(ReadOnlySpan<T> source)
    parameters:
    - id: source
      type: System.ReadOnlySpan{{T}}
      description: The source array (must have at least 2 elements)
    typeParameters:
    - id: T
      description: The element type
    return:
      type: '{T}[]'
      description: A new array representing a random derangement of the source
    content.vb: Public Shared Function Derange(Of T)(source As ReadOnlySpan(Of T)) As T()
  overload: Ampere.Base.Shuffler.Derange*
