  assemblies:
  - Ampere
  namespace: Ampere.Base
  summary: >-
    Performs reservoir sampling (Vitter's Algorithm L) to select

    <code class="paramref">k</code> elements uniformly at random from a potentially

    infinite or very large stream. Runs in O(n) time with O(k) space.
  example: []
  syntax:
    content: public static T[] ReservoirSample<T>(IEnumerable<T> source, int k)
    parameters:
    - id: source
      type: System.Collections.Generic.IEnumerable{{T}}
      description: The source enumerable (may be streamed)
    - id: k
      type: System.Int32
      description: The reservoir size (number of elements to sample)
    typeParameters:
    - id: T
      description: The element type
    return:
      type: '{T}[]'
      description: An array of k uniformly sampled elements
    content.vb: Public Shared Function ReservoirSample(Of T)(source As IEnumerable(Of T), k As Integer) As T()
  overload: Ampere.Base.Shuffler.ReservoirSample*
