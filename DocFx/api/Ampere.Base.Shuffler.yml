  assemblies:
  - Ampere
  namespace: Ampere.Base
  summary: >-
    Selects <code class="paramref">k</code> elements from a weighted distribution using

    the Efraimidis–Spirakis algorithm. Each element is associated with a weight

    that determines its probability of selection. Runs in O(n log k).
  example: []
  syntax:
    content: public static T[] WeightedSample<T>(ReadOnlySpan<T> items, ReadOnlySpan<double> weights, int k)
    parameters:
    - id: items
      type: System.ReadOnlySpan{{T}}
      description: The source items
    - id: weights
      type: System.ReadOnlySpan{System.Double}
      description: The corresponding weights (must be positive)
    - id: k
      type: System.Int32
      description: The number of elements to select
    typeParameters:
    - id: T
      description: The element type
    return:
      type: '{T}[]'
      description: An array of k weighted-sampled elements
    content.vb: Public Shared Function WeightedSample(Of T)(items As ReadOnlySpan(Of T), weights As ReadOnlySpan(Of Double), k As Integer) As T()
