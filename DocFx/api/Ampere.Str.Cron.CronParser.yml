  assemblies:
  - Ampere
  namespace: Ampere.Str.Cron
  summary: >-
    A high-performance, enterprise-grade cron expression parser supporting standard

    5-field (minute–DOW), 6-field (with seconds), and 7-field (with year) formats,

    plus Quartz-style extensions (<code>L</code>, <code>W</code>, <code>LW</code>, <code>#</code>, <code>?</code>)

    and predefined macros (<code>@yearly</code>, <code>@monthly</code>, etc.).


    <p>

    All public methods are thread-safe.  Parsed <xref href="Ampere.Str.Cron.CronExpression" data-throw-if-not-resolved="false"></xref> instances

    are immutable and may be cached freely.

    </p>
