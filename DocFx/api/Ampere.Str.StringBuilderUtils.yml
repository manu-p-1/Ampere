  assemblies:
  - Ampere
  namespace: Ampere.Str
  summary: >-
    Returns this instance of the StringBuilder in which a specific occurrence of a specified string in the current instance

    is replaced another specified string on a integer defined interval. This allows certain occurrences/intervals of text

    up to a predefined stop count. This is an overload of <xref href="Ampere.Str.StringBuilderUtils.ReplaceInterval(System.Text.StringBuilder%2cSystem.String%2cSystem.String%2cSystem.Int32%2cSystem.Int32%2cSystem.StringComparison%2cSystem.Boolean)" data-throw-if-not-resolved="false"></xref>

    <example>

    Given the following string, "very very very very very very very", StringBuilder.ReplaceInterval("very", "happy", 2, sb.Length, StringComparison.CurrentCulture)

    will replace every second "very" with the word "happy" until the very end of the string. The result would be:

    "very happy very happy very happy very"

    </example>

    <example>

    Given the following string, "very very very very very very very", StringBuilder.ReplaceInterval("very", "happy", 2, 3)

    will replace every second "very" with the word "happy" until the third occurrence of "very". The result would be:

    "very happy very very very very very"

    </example>
  example: []
  syntax:
    content: public static StringBuilder ReplaceInterval(this StringBuilder sb, string oldValue, string? newValue, int every)
    parameters:
    - id: sb
      type: System.Text.StringBuilder
      description: The StringBuilder Instance
    - id: oldValue
      type: System.String
      description: The string to be replaced
    - id: newValue
      type: System.String
      description: The string to replace an occurrence of <code class="paramref">oldValue</code>
    - id: every
      type: System.Int32
      description: The interval the replacement should follow - read as, "Replace every nth occurrence of <code class="paramref">oldValue</code>"
    return:
      type: System.Text.StringBuilder
      description: This StringBuilder instance
    content.vb: Public Shared Function ReplaceInterval(sb As StringBuilder, oldValue As String, newValue As String, every As Integer) As StringBuilder
